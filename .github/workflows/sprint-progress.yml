name: Sprint Progress Tracker

on:
  schedule:
    # Daily at 09:00 UTC (~4 AM CDT / 5 AM CST). Single daily refresh.
    - cron: "0 9 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  issues: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gh CLI extension auth
        run: gh --version
        env:
          GH_TOKEN: ${{ secrets.PM_BOARD_TOKEN }}

      - name: Run progress updater
        env:
          # PM_BOARD_TOKEN must be a fine-grained PAT (or classic) with:
          #   - read/write access to user project lcurtis4/projects/1
          #   - read/write access to issues in lcurtis4/InventoryApp
          GH_TOKEN: ${{ secrets.PM_BOARD_TOKEN }}
        run: python3 .github/scripts/update_sprint_progress.py
