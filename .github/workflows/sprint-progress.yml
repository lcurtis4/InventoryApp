name: Sprint Progress Tracker

on:
  schedule:
    # Hourly safety net so the board never goes stale > 1h, even if events are missed.
    - cron: "0 * * * *"
  # Event-based triggers: refresh whenever an issue moves or changes meaningfully
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled, assigned, unassigned]
  # Sub-issue link/unlink events — keeps progress accurate when children attach/detach
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  issues: write

# Coalesce overlapping runs so we don't double-fire when many events land at once
concurrency:
  group: sprint-progress
  cancel-in-progress: true

jobs:
  update-progress:
    runs-on: ubuntu-latest
    # Skip self-triggered loops: don't react to our own bot edits to the epic body
    if: >-
      github.event_name != 'issues' ||
      !contains(github.event.issue.body, '<!-- progress:start -->') ||
      github.event.action != 'edited'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run progress updater
        env:
          # PM_BOARD_TOKEN must be a fine-grained PAT (or classic) with:
          #   - read/write access to user project lcurtis4/projects/1
          #   - read/write access to issues in lcurtis4/InventoryApp
          GH_TOKEN: ${{ secrets.PM_BOARD_TOKEN }}
        run: python3 .github/scripts/update_sprint_progress.py
